name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

# Never run on pull_request — deploy only from main or manual trigger.

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false  # Never cancel a deploy already in progress.

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate required configuration
        # Fail early with a clear message if any required variable or secret is absent.
        # Values are never printed — only presence is checked.
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_PLANT_ID: ${{ vars.VITE_PLANT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          [ -n "$VITE_API_URL" ]          || missing+=(VITE_API_URL)
          [ -n "$VITE_PLANT_ID" ]         || missing+=(VITE_PLANT_ID)
          [ -n "$CLOUDFLARE_API_TOKEN" ]  || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Required configuration is missing: %s\n' "${missing[*]}" >&2
            printf 'Set GitHub Variables (VITE_API_URL, VITE_PLANT_ID, CLOUDFLARE_ACCOUNT_ID)\n' >&2
            printf 'and GitHub Secrets (CLOUDFLARE_API_TOKEN) before running this workflow.\n' >&2
            exit 1
          fi
          printf 'All required configuration is present.\n'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_PLANT_ID: ${{ vars.VITE_PLANT_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          npx wrangler pages deploy dist
          --project-name=mplacas-frontend
          --branch=main
